<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>TTRPG SRD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: #b0b0b0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin-top: 0.5rem;
            font-size: 1rem;
            color: #b0b0b0;
        }

        .cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 700px;
        }

        .card {
            background: #2a2a2a;
            border: 1px solid #404040;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            width: 300px;
            text-align: center;
            transition: border-color 0.2s, transform 0.2s;
        }

        .card:hover {
            border-color: #7c3aed;
            transform: translateY(-2px);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }

        .card .version {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-bottom: 1.25rem;
        }

        .card-links {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .card-links a {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-read {
            background: #7c3aed;
            color: #ffffff;
        }

        .btn-read:hover {
            background: #6d28d9;
        }

        .btn-download {
            background: #3a3a3a;
            color: #b0b0b0;
        }

        .btn-download:hover {
            background: #404040;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.85rem;
        }

        footer a {
            color: #b0b0b0;
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #7c3aed;
        }

        @media (max-width: 660px) {
            .card { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>TTRPG SRD</h1>
        <p class="subtitle">Коллекция переводов SRD настольных ролевых игр</p>
    </header>

    <div class="cards">
        <div class="card">
            <div class="card-icon">🎲</div>
            <h2>Dungeons & Dragons</h2>
            <p class="version">SRD 5.2.1 · SRD 5.1</p>
            <div class="card-links">
                <a href="/ttrpg_srd_markdown/" class="btn-read">Читать</a>
                <a href="https://github.com/Nemo-Illusionist/ttrpg_srd_markdown/releases?q=dnd-srd" class="btn-download">Скачать</a>
            </div>
        </div>

        <div class="card">
            <div class="card-icon">⚔️</div>
            <h2>Daggerheart</h2>
            <p class="version">SRD 1.0</p>
            <div class="card-links">
                <a href="/ttrpg_srd_markdown/daggerheart/srd-1.0/00_Legal/" class="btn-read">Читать</a>
                <a href="https://github.com/Nemo-Illusionist/ttrpg_srd_markdown/releases?q=dh-srd" class="btn-download">Скачать</a>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://github.com/Nemo-Illusionist/ttrpg_srd_markdown">GitHub</a>
    </footer>
</body>
</html>
